name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install QA dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run repository QA checks
        run: |
          chmod +x ./qa_check.sh
          ./qa_check.sh
